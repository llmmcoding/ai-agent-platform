apiVersion: v1
kind: Service
metadata:
  name: ai-agent-core-service
  namespace: ai-agent
spec:
  type: ClusterIP
  selector:
    app: ai-agent-core
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: grpc
      port: 9090
      targetPort: 9090

---
apiVersion: v1
kind: Service
metadata:
  name: ai-agent-python-worker-service
  namespace: ai-agent
spec:
  type: ClusterIP
  selector:
    app: ai-agent-python-worker
  ports:
    - name: http
      port: 8001
      targetPort: 8001
